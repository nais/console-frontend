environmentKinds:
  - management
values:
  host:
    displayName: hostname override
    computed:
      template: '{{ subdomain . "console" }}'
    config:
      type: string
  tenantDomain:
    computed:
      template: '{{ subdomain . "" }}'
  slack.token:
    displayName: Slack token
    description: Token for the Slack API
    config:
      type: string
      secret: true
  slack.feedbackChannel:
    displayName: Slack feedback channel
    description: The Slack channel to post feedback to
    config:
      type: string
  gitHub.organization:
    displayName: GitHub organization
    description: The organization slug where the github reconciler will manage teams
    computed:
      template: |
        {{ .Env.teams_github_org | quote }}
  resources.requests.cpu:
    displayName: CPU requests
    config:
      type: string
  resources.requests.memory:
    displayName: Memory requests
    config:
      type: string
  resources.limits.memory:
    displayName: Memory limits
    config:
      type: string
  replicaCount:
    displayName: Number of replicas
    config:
      type: int
  tracking.enabled:
    displayName: Enable analytics tracking
    description: Enable Umami/Innblikk tracking via the ResearchOps sporing script
    config:
      type: bool
  tracking.websiteId:
    displayName: Tracking website ID
    description: The Umami/Innblikk website UUID for this tenant
    config:
      type: string
  tracking.dev:
    displayName: Use dev tracking proxy
    description: Use the dev sporing script and proxy endpoint instead of production
    config:
      type: bool
