query TenantDeployments(
	$first: Int
	$last: Int
	$before: Cursor
	$after: Cursor
	$filter: DeploymentFilter
) {
	environments {
		nodes {
			id
			name
		}
	}
	deployments(first: $first, last: $last, before: $before, after: $after, filter: $filter)
		@paginate(mode: SinglePage) {
		pageInfo {
			hasNextPage
			endCursor
			hasPreviousPage
			pageEnd
			pageStart
			startCursor
			totalCount
		}
		edges {
			node {
				id
				statuses {
					nodes {
						state
						message
						createdAt
					}
				}
				resources {
					nodes {
						id
						kind
						name
					}
				}
				environmentName
				createdAt
				teamSlug
				repository
				commitSha
				deployerUsername
				triggerUrl
			}
		}
	}
}
