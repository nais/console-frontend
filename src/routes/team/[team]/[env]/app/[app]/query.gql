query App($app: String!, $team: Slug!, $env: String!) {
	team(slug: $team) {
		environment(name: $env) {
			application(name: $app) {
				__typename
				id
				name
				team {
					slug
				}
				issues {
					edges {
						node {
							id
							__typename
							severity
							message
							...IssueFragment
						}
					}
				}
				criticalIssues: issues(filter: { severity: CRITICAL }) {
					pageInfo {
						totalCount
					}
				}
				warningIssues: issues(filter: { severity: WARNING }) {
					pageInfo {
						totalCount
					}
				}
				todoIssues: issues(filter: { severity: TODO }) {
					pageInfo {
						totalCount
					}
				}
				teamEnvironment {
					environment {
						name
					}
				}

				deletionStartedAt
				deployments(first: 1) {
					nodes {
						triggerUrl
						statuses {
							nodes {
								state
								message
								createdAt
							}
						}
					}
				}

				instanceGroups {
					id
					name
					image {
						name
						tag
					}
					created
					readyInstances
					desiredInstances
					instances {
						id
						name
						status {
							state
						}
						restarts
					}
				}

				...WorkloadLatestActivityFragment @with(limit: 3)
				...Persistence
				...WorkloadDeploy
				...Manifest
			}
		}
	}
}
