query App($app: String!, $team: Slug!, $env: String!) {
	team(slug: $team) {
		environment(name: $env) {
			application(name: $app) {
				__typename
				id
				name
				labels {
					key
					value
				}
				team {
					slug
				}
				issues {
					edges {
						node {
							id
							__typename
							severity
							message
							...IssueFragment
						}
					}
				}
				criticalIssues: issues(filter: { severity: CRITICAL }) {
					pageInfo {
						totalCount
					}
				}
				warningIssues: issues(filter: { severity: WARNING }) {
					pageInfo {
						totalCount
					}
				}
				todoIssues: issues(filter: { severity: TODO }) {
					pageInfo {
						totalCount
					}
				}
				teamEnvironment {
					environment {
						name
					}
				}

				deletionStartedAt

				...Persistence
				...WorkloadDeploy
				...Manifest
			}
		}
	}
}
