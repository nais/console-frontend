query Instances($app: String!, $team: Slug!, $env: String!) {
	team(slug: $team) {
		slug
		environment(name: $env) {
			environment {
				name
			}
			application(name: $app) {
				name
				instances {
					nodes {
						name
					}
				}
				logDestinations {
					... on LogDestinationGeneric {
						id
						__typename
						name
					}
					... on LogDestinationLoki {
						id
						__typename
						grafanaURL
					}
				}
			}
		}
	}
}
