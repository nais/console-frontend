query AppInstanceGroups($app: String!, $team: Slug!, $env: String!) {
	team(slug: $team) {
		environment(name: $env) {
			application(name: $app) {
				instanceGroups {
					id
					name
					image {
						name
						tag
					}
					created
					readyInstances
					desiredInstances
					instances {
						id
						name
						status {
							state
						}
						restarts
					}
				}
			}
		}
	}
}
