query Config($config: String!, $team: Slug!, $env: String!) @cache(policy: NetworkOnly) {
	me {
		... on User {
			isAdmin
		}
	}
	team(slug: $team) {
		viewerIsMember
		environment(name: $env) {
			config(name: $config) {
				name
				teamEnvironment {
					environment {
						name
					}
				}
				values {
					name
					value
					encoding
				}
				workloads {
					nodes {
						id
						__typename
						name
						teamEnvironment {
							environment {
								name
							}
						}
						team {
							slug
						}
					}
				}
				lastModifiedAt
				lastModifiedBy {
					name
					email
				}
				...ResourceActivityCardConfigFragment @mask_disable
			}
		}
	}
}
