query Job($job: String!, $team: Slug!, $env: String!) @cache(policy: NetworkOnly) {
	team(slug: $team) {
		environment(name: $env) {
			job(name: $job) {
				__typename
				id
				name
				deletionStartedAt
				team {
					slug
				}
				issues {
					edges {
						node {
							id
							severity
							...IssueFragment
						}
					}
				}
				criticalIssues: issues(filter: { severity: CRITICAL }) {
					pageInfo {
						totalCount
					}
				}
				warningIssues: issues(filter: { severity: WARNING }) {
					pageInfo {
						totalCount
					}
				}
				todoIssues: issues(filter: { severity: TODO }) {
					pageInfo {
						totalCount
					}
				}
				schedule {
					expression
					timeZone
				}
				teamEnvironment {
					environment {
						name
					}
				}
				deployments(first: 1) {
					nodes {
						triggerUrl
						statuses {
							nodes {
								state
								message
								createdAt
							}
						}
					}
				}
				recentRuns: runs(first: 10) {
					nodes {
						status {
							state
						}
					}
				}
				resources {
					requests {
						cpu
						memory
					}
					limits {
						cpu
						memory
					}
				}

				...WorkloadLatestActivityFragment @with(limit: 3)
				...JobRuns
				...Persistence
				...WorkloadDeploy
				...NetworkPolicy
				...Manifest
			}
		}
	}
}
