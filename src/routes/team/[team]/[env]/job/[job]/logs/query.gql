query RunsWithPodNames($job: String!, $team: Slug!, $env: String!) {
	team(slug: $team) {
		slug
		environment(name: $env) {
			environment {
				name
			}
			job(name: $job) {
				name
				logDestinations {
					... on LogDestinationGeneric {
						__typename
						name
					}
					... on LogDestinationLoki {
						__typename
						id
						grafanaURL
					}
					... on LogDestinationSecureLogs {
						__typename
						id
					}
				}
				runs {
					nodes {
						id
						name
						instances {
							nodes {
								id
								name
							}
						}
						status {
							state
						}
					}
				}
			}
		}
	}
}
