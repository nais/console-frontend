query Alerts(
	$team: Slug!
	$filter: TeamAlertsFilter
	$orderBy: AlertOrder
	$first: Int
	$last: Int
	$before: Cursor
	$after: Cursor
) @cache(policy: NetworkOnly) {
	team(slug: $team) {
		slug
		alerts(
			first: $first
			last: $last
			filter: $filter
			orderBy: $orderBy
			before: $before
			after: $after
		) @paginate(mode: SinglePage) {
			pageInfo {
				startCursor
				endCursor
				hasNextPage
				hasPreviousPage
				pageStart
				pageEnd
				totalCount
			}
			edges {
				node {
					id
					name
					state
					query
					duration
					... on PrometheusAlert {
						name
						duration
						query
						alarms {
							action
							consequence
							since
							summary
							state
							value
						}
						ruleGroup
						teamEnvironment {
							environment {
								name
							}
						}
					}
					team {
						slug
					}
					teamEnvironment {
						environment {
							name
						}
					}
				}
			}
		}
		environments {
			id
			environment {
				name
			}
		}
	}
}
