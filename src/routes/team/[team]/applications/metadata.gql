query ApplicationsListMetadata($team: Slug!) @cache(policy: CacheAndNetwork) {
	team(slug: $team) {
		environments {
			id
			environment {
				name
			}
		}
		totalApplications: applications {
			pageInfo {
				totalCount
			}
		}
		inventoryCounts {
			applications {
				running
				notRunning
				unknown
				total
			}
		}
	}
}
