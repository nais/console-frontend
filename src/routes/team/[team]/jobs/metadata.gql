query JobsListMetadata($team: Slug!) @cache(policy: CacheAndNetwork) {
	team(slug: $team) {
		environments {
			id
			environment {
				name
			}
		}
		totalJobs: jobs {
			pageInfo {
				totalCount
			}
		}
		inventoryCounts {
			jobs {
				running
				completed
				failed
				unknown
				total
			}
		}
	}
}
