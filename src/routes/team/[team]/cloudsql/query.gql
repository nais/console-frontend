query SqlInstances(
	$team: Slug!
	$orderBy: SqlInstanceOrder
	$first: Int
	$last: Int
	$before: Cursor
	$after: Cursor
) {
	team(slug: $team) {
		slug

		serviceUtilization {
			sqlInstances {
				cpu {
					requested
					utilization
				}
				disk {
					requested
					utilization
				}
				memory {
					requested
					utilization
				}
			}
		}
		sqlInstances(first: $first, last: $last, orderBy: $orderBy, before: $before, after: $after)
			@paginate(mode: SinglePage) {
			pageInfo {
				hasNextPage
				hasPreviousPage
				pageStart
				pageEnd
				totalCount
				startCursor
				endCursor
			}
			edges {
				node {
					id
					__typename
					name
					teamEnvironment {
						environment {
							name
						}
					}
					team {
						slug
					}
					connectionName
					state
					version
					cost {
						sum
					}
					metrics {
						cpu {
							cores
							utilization
						}
						memory {
							quotaBytes
							utilization
						}
						disk {
							quotaBytes
							utilization
						}
					}
					issues {
						pageInfo {
							totalCount
						}
						edges {
							node {
								id
								severity
							}
						}
					}

					workload {
						__typename
						name
						teamEnvironment {
							environment {
								name
							}
						}
						team {
							slug
						}
					}
				}
			}
		}
	}
}
