query Secrets(
	$team: Slug!
	$orderBy: SecretOrder
	$filter: SecretFilter
	$first: Int
	$last: Int
	$before: Cursor
	$after: Cursor
) @cache(policy: CacheAndNetwork) {
	me {
		... on User {
			isAdmin
		}
	}
	team(slug: $team) {
		viewerIsMember
		secrets(
			first: $first
			last: $last
			before: $before
			after: $after
			orderBy: $orderBy
			filter: $filter
		) @paginate(mode: SinglePage) {
			pageInfo {
				totalCount
				hasPreviousPage
				hasNextPage
				pageEnd
				pageStart
				startCursor
				endCursor
			}
			facets {
				environments {
					value
					count
				}
				inUse {
					value
					count
				}
				labels {
					key
					value
					count
				}
			}
			edges {
				node {
					id
					name
					lastModifiedAt
					teamEnvironment {
						environment {
							name
						}
					}
					workloads {
						pageInfo {
							totalCount
						}
					}
				}
			}
		}
		environments {
			environment {
				name
			}
		}
	}
}
